$kind: http-request
name: Refresh Token
method: POST
url: '{{baseUrl}}/auth/refresh'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "refreshToken": "{{refreshToken}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const res = pm.response.json();
      if (res.accessToken) pm.collectionVariables.set("accessToken", res.accessToken);
