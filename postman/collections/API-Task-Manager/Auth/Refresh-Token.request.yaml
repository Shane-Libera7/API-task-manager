$kind: http-request
name: Refresh Token
method: POST
url: "{{baseUrl}}/auth/refresh"
auth:
  type: jwt
order: 3000
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "refreshToken": "{{refreshToken}}"
    }
scripts:
  - type: afterResponse
    code: >-
      const res = pm.response.json();

      if (res.accessToken) pm.collectionVariables.set("accessToken",
      res.accessToken);
    language: text/javascript
